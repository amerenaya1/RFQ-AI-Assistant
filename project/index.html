<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Disty Build · RFQ AI Assistant</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin:0; padding:0; font-family: var(--font-sans); background:#EDEAE3; color: var(--ink-900); }
  *, *::before, *::after { box-sizing: border-box; }
  #root { min-height: 100vh; }

  /* Animations */
  @keyframes msgIn {
    0% { opacity: 0; transform: translateY(8px) scale(0.98); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes panelIn {
    0% { opacity: 0; max-height: 0; }
    100% { opacity: 1; max-height: 500px; }
  }
  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-3px); opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }
  @keyframes toastIn {
    0% { opacity: 0; transform: translateY(-12px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes confetti {
    0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--dx, 0px), 900px) rotate(var(--rot, 720deg)); }
  }

  /* Hide scrollbar in chat */
  .chat-scroll::-webkit-scrollbar { display: none; }
  .chat-scroll { scrollbar-width: none; }

  /* Lucide icon sizing inside our Icon component */
  i[data-lucide] { display: inline-flex; }
  i[data-lucide] svg { display: block; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="flow.jsx"></script>
  <script type="text/babel" src="chat-ui.jsx"></script>
  <script type="text/babel" src="step-components.jsx"></script>
  <script type="text/babel" src="smart-flow.jsx"></script>
  <script type="text/babel" src="items-panel.jsx"></script>
  <script type="text/babel" src="smart-app.jsx"></script>
  <script type="text/babel">
    function Root() {
      const [t, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
        "tone": "friendly",
        "density": "comfortable"
      }/*EDITMODE-END*/);

      window.__tweaks = t;

      return (
        <>
          <SmartApp tweaksProp={t} />
          <TweaksPanel>
            <TweakSection label="AI tone" />
            <TweakRadio
              value={t.tone}
              options={[
                { value: 'business', label: 'Business' },
                { value: 'friendly', label: 'Friendly' },
                { value: 'expert', label: 'Expert' },
              ]}
              onChange={(v) => setTweak('tone', v)}
            />
            <TweakSection label="Density" />
            <TweakRadio
              value={t.density}
              options={[
                { value: 'comfortable', label: 'Comfortable' },
                { value: 'compact', label: 'Compact' },
              ]}
              onChange={(v) => setTweak('density', v)}
            />
          </TweaksPanel>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
